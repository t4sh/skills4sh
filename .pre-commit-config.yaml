# Optional local pre-commit hooks. CI is the enforced gate.
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: trivy-fs
        name: Trivy filesystem scan
        entry: python .githooks/trivy-precommit.py
        language: python
        pass_filenames: false
