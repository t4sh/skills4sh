name: guardskills Scan

on:
  push:
    paths:
      - 'skills/**'
      - '.github/workflows/guardskills.yml'
  pull_request:
    paths:
      - 'skills/**'
      - '.github/workflows/guardskills.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        skill: [agent-memory, discord-harvest, eleventy-nunjucks, localhost-screenshots]
        node-version: ['22', '24']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Scan ${{ matrix.skill }}
        run: npx guardskills add t4sh/skills4sh --skill ${{ matrix.skill }} --ci --yes
