name: guardskills Scan

on:
  push:
    paths:
      - 'skills/**'
      - '.security/**'
      - 'bin/guardskills-check.mjs'
      - 'package.json'
      - '.github/workflows/guardskills.yml'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        skill: [agent-memory, discord-harvest, eleventy-nunjucks, figma-to-code, localhost-screenshots]
        node-version: ['22', '24']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Scan ${{ matrix.skill }}
        run: node bin/guardskills-check.mjs ${{ matrix.skill }}
