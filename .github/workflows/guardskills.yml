name: guardskills Scan

on:
  push:
    paths:
      - 'skills/**'
      - '.github/workflows/guardskills.yml'
  pull_request:
    paths:
      - 'skills/**'
      - '.github/workflows/guardskills.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        skill: [agent-memory, discord-harvest, eleventy-nunjucks, localhost-screenshots]
        node-version: ['22', '24']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Scan ${{ matrix.skill }}
        run: |
          # eleventy-nunjucks has documented R005_SECRET_READ false positives
          # from instructional grep/curl snippets in reference docs (see
          # .security/eleventy-nunjucks.yaml `expected_findings` — every
          # finding is pre-reviewed and traceable to documentation, not
          # exfiltration code). --force overrides the UNSAFE outcome for
          # this specific skill. All other skills run without --force.
          flags="--ci --yes"
          if [ "${{ matrix.skill }}" = "eleventy-nunjucks" ]; then
            flags="$flags --force"
          fi
          npx guardskills add t4sh/skills4sh --skill ${{ matrix.skill }} $flags
