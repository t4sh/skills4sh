name: guardskills Scan

on:
  push:
    paths:
      - 'skills/**'
      - '.security/**'
      - 'bin/guardskills-check.mjs'
      - 'package.json'
      - '.github/workflows/guardskills.yml'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        skill: [agent-memory, discord-harvest, eleventy-nunjucks, localhost-screenshots]
        node-version: ['22', '24']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Scan ${{ matrix.skill }}
        run: node bin/guardskills-check.mjs ${{ matrix.skill }}
