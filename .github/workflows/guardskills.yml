name: guardskills Scan

on:
  push:
    paths:
      - 'skills/**'
      - '.security/**'
      - 'bin/guardskills-check.mjs'
      - 'package.json'
      - '.github/workflows/guardskills.yml'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        skill: [agent-memory, code-to-figma, discord-harvest, eleventy-nunjucks, figma-to-code, localhost-screenshots, skill-architect]
        node-version: ['22', '24']
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Scan ${{ matrix.skill }}
        run: node bin/guardskills-check.mjs ${{ matrix.skill }}
