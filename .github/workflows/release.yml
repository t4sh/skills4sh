name: Release Guards

# Replicates the local `prepublishOnly` hook in CI so that:
#   1. `bin/` drift is caught at PR / push time (before merge), not only
#      when someone runs `npm publish` locally.
#   2. If/when CI gains a `npm publish` step, the check sits next to it
#      explicitly — not relying on `prepublishOnly` (which CI could bypass
#      with `npm publish --ignore-scripts` either intentionally or by
#      accident).
#
# Trigger logic:
#   - push / pull_request when bin/ or package.json changes → catches the
#     bug class early (someone edits install.mjs without bumping version
#     while a tag for the current version already exists).
#   - tag push (v*) → explicit gate before any future CI publish step.
#     At tag time the check is trivially passing (tag === HEAD), but its
#     presence is the contract. Publish still requires an annotated signed
#     version tag verified by bin/release-check.mjs.

on:
  push:
    branches: [main]
    paths:
      - 'bin/**'
      - 'package.json'
      - 'npm-shrinkwrap.json'
      - '.github/scripts/check-bin-tag-parity.sh'
      - '.github/workflows/release.yml'
    tags:
      - 'v*'
  # Always run on PRs so branch-protection can require `bin/ matches tag…`
  # without blocking PRs that didn't touch bin/ or the package manifest.
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  bin-tag-parity:
    name: bin/ matches tag for current package.json version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history + tags needed for `git rev-parse refs/tags/vX.Y.Z`
          # and the `git diff <tag> -- bin/` step inside the script.
          fetch-depth: 0

      - name: Setup Python (script uses python3 for JSON parsing)
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3'

      - name: Run prepublishOnly check
        run: |
          bash .github/scripts/check-bin-tag-parity.sh
          npm run check:pack
