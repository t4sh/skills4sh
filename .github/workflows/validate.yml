name: Validate Skills

on:
  push:
    paths:
      - 'skills/**'
      - 'skills-lock.json'
      - 'npm-shrinkwrap.json'
      - 'package.json'
      - 'README.md'
      - 'SECURITY.md'
      - 'AGENTS.md'
      - '.security/**'
      - '.cursor-plugin/**'
      - '.claude-plugin/**'
      - '.github/workflows/validate.yml'
      - '.github/scripts/verify-versions.sh'
      - 'bin/**'
      - 'tests/**'
  # Always run on PRs so branch-protection can require `validate (22)` and
  # `validate (24)` without blocking PRs that don't touch the listed paths.
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['22', '24']
    steps:
      - uses: actions/checkout@v4
        with:
          # drift-check.mjs uses `git show HEAD^:skills/<x>/SKILL.md` for the
          # semver monotonicity check. Default fetch-depth (1) hides HEAD^ on
          # push events and the check silently skips. Depth 2 is the minimum
          # needed for the previous-commit comparison.
          fetch-depth: 2

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Check SKILL.md frontmatter
        run: |
          errors=0
          for skill_md in skills/*/SKILL.md; do
            dir=$(dirname "$skill_md")
            name=$(basename "$dir")

            echo "Checking $name..."

            # Verify frontmatter exists
            if ! head -1 "$skill_md" | grep -q '^---$'; then
              echo "  ERROR: Missing YAML frontmatter"
              errors=$((errors + 1))
              continue
            fi

            # Extract name field
            fm_name=$(sed -n '/^---$/,/^---$/p' "$skill_md" | grep '^name:' | head -1 | sed 's/name: *//' | tr -d '"')
            if [ "$fm_name" != "$name" ]; then
              echo "  ERROR: name '$fm_name' does not match directory '$name'"
              errors=$((errors + 1))
            fi

            # Check required fields
            for field in name description; do
              if ! sed -n '/^---$/,/^---$/p' "$skill_md" | grep -q "^$field:"; then
                echo "  ERROR: Missing required field: $field"
                errors=$((errors + 1))
              fi
            done

            echo "  OK"
          done

          if [ "$errors" -gt 0 ]; then
            echo ""
            echo "Found $errors error(s)"
            exit 1
          fi

      - name: Check skill completeness
        run: |
          errors=0
          for dir in skills/*/; do
            name=$(basename "$dir")
            skill_errors=0
            echo "Checking $name completeness..."

            [ -f "$dir/SKILL.md" ] || { echo "  ERROR: Missing SKILL.md"; errors=$((errors + 1)); skill_errors=$((skill_errors + 1)); }
            [ -f ".security/$name.yaml" ] || { echo "  ERROR: Missing .security/$name.yaml"; errors=$((errors + 1)); skill_errors=$((skill_errors + 1)); }

            if [ "$skill_errors" -eq 0 ]; then
              echo "  OK"
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo ""
            echo "Found $errors completeness error(s)"
            exit 1
          fi

      - name: Verify content hashes (AST01/AST02)
        run: node bin/hash-check.mjs

      - name: Verify version consistency (AST07)
        run: bash .github/scripts/verify-versions.sh

      - name: Verify docs and security manifests do not drift
        run: npm run check:drift

      - name: Verify npm package payload
        run: npm run check:pack

      - name: Run installer unit tests
        run: node --test tests/*.test.mjs
