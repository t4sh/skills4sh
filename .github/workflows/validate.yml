name: Validate Skills

on:
  push:
    paths:
      - 'skills/**'
      - 'skills-lock.json'
  pull_request:
    paths:
      - 'skills/**'
      - 'skills-lock.json'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['22', '24']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Check SKILL.md frontmatter
        run: |
          errors=0
          for skill_md in skills/*/SKILL.md; do
            dir=$(dirname "$skill_md")
            name=$(basename "$dir")

            echo "Checking $name..."

            # Verify frontmatter exists
            if ! head -1 "$skill_md" | grep -q '^---$'; then
              echo "  ERROR: Missing YAML frontmatter"
              errors=$((errors + 1))
              continue
            fi

            # Extract name field
            fm_name=$(sed -n '/^---$/,/^---$/p' "$skill_md" | grep '^name:' | head -1 | sed 's/name: *//' | tr -d '"')
            if [ "$fm_name" != "$name" ]; then
              echo "  ERROR: name '$fm_name' does not match directory '$name'"
              errors=$((errors + 1))
            fi

            # Check required fields
            for field in name description; do
              if ! sed -n '/^---$/,/^---$/p' "$skill_md" | grep -q "^$field:"; then
                echo "  ERROR: Missing required field: $field"
                errors=$((errors + 1))
              fi
            done

            echo "  OK"
          done

          if [ "$errors" -gt 0 ]; then
            echo ""
            echo "Found $errors error(s)"
            exit 1
          fi

      - name: Check skill completeness
        run: |
          for dir in skills/*/; do
            name=$(basename "$dir")
            echo "Checking $name completeness..."

            [ -f "$dir/SKILL.md" ] || { echo "  WARN: Missing SKILL.md"; }
            [ -f ".security/$(basename "$dir").yaml" ] || { echo "  WARN: Missing .security/$(basename "$dir").yaml"; }

            echo "  OK"
          done

      - name: Verify content hashes (AST01/AST02)
        run: node bin/hash-check.mjs

      - name: Verify version consistency (AST07)
        run: bash .github/scripts/verify-versions.sh
