name: npm publish

# Publish skills4sh to the npm registry with OIDC provenance attestation.
#
# Fires on GitHub release publish (the same `gh release create` we run
# manually for each version). The release event's `tag_name` is the
# source of truth for the ref to publish — workflow checks out exactly
# that tag, not the branch HEAD at trigger time.
#
# Auth: OIDC Trusted Publisher (no NPM_TOKEN required).
#
# Prereqs (one-time setup):
#   1. On npmjs.com, the `skills4sh` package has a Trusted Publisher
#      configured pointing at this repo + this workflow filename:
#      https://www.npmjs.com/package/skills4sh/access
#      → Trusted Publishers
#      → Repository: t4sh/skills4sh
#      → Workflow:  npm-publish.yml
#      → Environment: (blank)
#   2. `id-token: write` permission below issues the OIDC token that npm
#      verifies against the Trusted Publisher binding above. The same
#      token signs the provenance attestation.
#   3. package.json `repository.url` matches the GitHub repo.
#
# No NPM_TOKEN secret is needed. The previous token-based flow is
# documented in git history (commit history around v0.3.1-v0.3.2) but
# is superseded by Trusted Publishers — there's no token to rotate, no
# token to leak, and the workflow file path itself is the trust anchor.
#
# Why CI-only provenance:
#   Local `npm publish` cannot produce provenance attestations — OIDC is
#   only available to GitHub-Actions / GitLab-CI runners. Provenance
#   attests "this tarball was built by THIS workflow, from THIS commit,
#   on THIS public CI runner" — consumers verify via `npm audit signatures`.
#
# Manual trigger:
#   workflow_dispatch re-runs the publish from any tag/ref without
#   cutting a new GitHub release.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (tag or sha) to publish from"
        required: true
        default: ""

permissions:
  contents: read
  id-token: write   # OIDC for npm provenance

jobs:
  publish:
    name: publish to npm with provenance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref || github.ref }}
          fetch-depth: 0     # check-bin-tag-parity.sh needs the tag history

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Pre-publish guards (mirrors local prepublishOnly + validate)
        run: |
          bash .github/scripts/check-bin-tag-parity.sh
          bash .github/scripts/verify-versions.sh
          node bin/hash-check.mjs

      - name: Run installer unit tests
        run: node --test tests/installer.test.mjs

      - name: Publish to npm (OIDC Trusted Publisher + provenance)
        run: npm publish --access public --provenance

      - name: Verify the published tarball was attested
        run: |
          set -e
          version=$(node -p "require('./package.json').version")
          echo "Verifying provenance for skills4sh@$version..."
          # Query the registry for attestation metadata. `npm audit
          # signatures` would require installing the package as a dep
          # (skills4sh isn't a dep of itself in this checkout), so we
          # check `dist.attestations` directly.
          attestations=$(npm view "skills4sh@$version" dist.attestations --json 2>/dev/null || echo null)
          if [ -z "$attestations" ] || [ "$attestations" = "null" ]; then
            echo "✗ No attestation metadata for skills4sh@$version"
            exit 1
          fi
          echo "✓ Attestation present: $attestations"
