name: npm publish

# Publish skills4sh to the npm registry with provenance attestation.
#
# Fires on GitHub release publish (the same `gh release create` we run
# manually for each version). The release event's `tag_name` is the
# source of truth for the ref to publish — workflow checks out exactly
# that tag, not the branch HEAD at trigger time.
#
# Auth: OIDC Trusted Publisher (no NPM_TOKEN required).
#
# Prereqs (one-time setup):
#   1. On npmjs.com, the `skills4sh` package has a Trusted Publisher
#      configured pointing at this repo + this workflow filename:
#      https://www.npmjs.com/package/skills4sh/access
#      → Trusted Publishers
#      → Repository: t4sh/skills4sh
#      → Workflow:  npm-publish.yml
#      → Environment: (blank)
#      AND "Publishing access" is set to "Require 2FA and disallow tokens".
#   2. `id-token: write` permission below issues the OIDC token that npm
#      verifies against the Trusted Publisher binding above. The same token
#      signs the provenance attestation — one credential, two purposes.
#   3. package.json `repository.url` matches the GitHub repo.
#   4. Release tags are annotated, signed, immutable, and named vX.Y.Z.
#
# No NPM_TOKEN secret is needed. The previous token-based flow lived from
# v0.3.0 through v0.3.8; superseded here. No token to rotate, no token to
# leak. The workflow file path itself is the trust anchor — renaming this
# file (or moving the publish to a different workflow) breaks the binding
# until npmjs.com is reconfigured to match.
#
# Why CI-only provenance:
#   Local `npm publish` cannot produce provenance attestations — OIDC is
#   only available to GitHub-Actions / GitLab-CI runners. Provenance
#   attests "this tarball was built by THIS workflow, from THIS commit,
#   on THIS public CI runner" — consumers verify via `npm audit signatures`.
#
# Manual trigger:
#   workflow_dispatch re-runs the publish from any tag/ref without
#   cutting a new GitHub release.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Signed version tag to publish from (vX.Y.Z)"
        required: true
        default: ""

permissions:
  contents: read
  id-token: write   # OIDC for npm provenance

jobs:
  publish:
    name: publish to npm with provenance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref || github.ref }}
          fetch-depth: 0     # check-bin-tag-parity.sh needs the tag history

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Node 24 (active LTS) ships with npm 11.x, which has OIDC-based
          # registry-PUT auth for Trusted Publisher. Node 22 ships with npm
          # 10.9.x — it signs SLSA provenance via OIDC, but does NOT use
          # OIDC to authenticate the publish itself, so the registry 404s
          # under a token-less Trusted Publisher setup. validate.yml still
          # tests installer code on Node 22 + 24; this is publish-runner-
          # only, no consumer-facing change. (engines.node = ">=22".)
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Pre-publish guards (mirrors local prepublishOnly + validate)
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.ref || github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node bin/release-check.mjs
          bash .github/scripts/check-bin-tag-parity.sh
          bash .github/scripts/verify-versions.sh
          node bin/hash-check.mjs
          npm run check:drift
          npm run check:pack

      - name: Run installer unit tests
        run: node --test tests/*.test.mjs

      - name: Publish to npm (OIDC Trusted Publisher + provenance)
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.ref || github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish --access public --provenance

      - name: Verify published registry metadata
        run: node bin/verify-published.mjs
