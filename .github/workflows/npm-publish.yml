name: npm publish

# Publish skills4sh to the npm registry with OIDC provenance attestation.
#
# Fires on GitHub release publish (the same `gh release create` we run
# manually for each version). The release event's `tag_name` is the
# source of truth for the ref to publish — workflow checks out exactly
# that tag, not the branch HEAD at trigger time.
#
# Prereqs (one-time setup):
#   1. Secrets > Actions > new repository secret `NPM_TOKEN` — an npm
#      Automation token with `publish` permission, generated at
#      https://www.npmjs.com/settings/<user>/tokens/granular-access-tokens/new
#   2. `id-token: write` permission below is what enables the OIDC token
#      that `npm publish --provenance` consumes to sign the attestation.
#   3. package.json `repository.url` must match this GitHub repo (already
#      configured at https://github.com/t4sh/skills4sh.git).
#
# Why CI-only provenance:
#   Local `npm publish` cannot produce provenance attestations — OIDC is
#   only available to GitHub-Actions / GitLab-CI runners. Provenance
#   attests "this tarball was built by THIS workflow, from THIS commit,
#   on THIS public CI runner" — consumers verify via `npm audit signatures`.
#
# Manual trigger:
#   workflow_dispatch lets you re-run the publish (e.g. after fixing an
#   NPM_TOKEN issue) without cutting a new release.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (tag or sha) to publish from"
        required: true
        default: ""

permissions:
  contents: read
  id-token: write   # OIDC for npm provenance

jobs:
  publish:
    name: publish to npm with provenance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref || github.ref }}
          fetch-depth: 0     # check-bin-tag-parity.sh needs the tag history

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Pre-publish guards (mirrors local prepublishOnly + validate)
        run: |
          bash .github/scripts/check-bin-tag-parity.sh
          bash .github/scripts/verify-versions.sh
          node bin/hash-check.mjs

      - name: Run installer unit tests
        run: node --test tests/installer.test.mjs

      - name: Publish to npm (with provenance)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Verify the published tarball was attested
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          version=$(node -p "require('./package.json').version")
          echo "Verifying provenance for skills4sh@$version..."
          npm audit signatures --json | grep -q "skills4sh" || {
            echo "✗ Provenance signature not found for skills4sh@$version"
            exit 1
          }
          echo "✓ Provenance attestation verified"
