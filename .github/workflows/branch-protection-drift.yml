name: Branch Protection Drift

# Asserts that refs/heads/main branch-protection configuration matches the
# checked-in snapshot at .github/branch-protection.expected.json.
#
# Why: SECURITY.md / AST09 documents branch protection as a control, but
# the actual settings live in GitHub Repo Settings — invisible to the repo
# and prone to silent drift if someone toggles a checkbox. This workflow
# fails loudly when the live config diverges from the documented intent.
#
# Reading branch protection requires `Administration: read` scope. The
# default GITHUB_TOKEN does NOT support that permission (it's not in the
# permitted scope list for workflow-issued tokens — verified empirically:
# `permissions: administration: read` is rejected at workflow parse time
# with HTTP 422 "Unexpected value 'administration'").
#
# Two ways to enable the check (pick one, both are read-only):
#
#   A. Fine-grained PAT (simplest)
#      1. https://github.com/settings/personal-access-tokens/new
#      2. Resource owner: yourself (t4sh); Repository access: only this repo
#      3. Permissions → Repository → Administration: Read-only
#      4. Save the token as repo secret BRANCH_PROTECTION_TOKEN.
#      Scope is narrow: read-only, this repo only, can be revoked any time.
#
#   B. GitHub App
#      1. Create a private GitHub App with Administration: Read-only.
#      2. Install on this repo.
#      3. Use actions/create-github-app-token to mint a short-lived token
#         and pass it as GH_TOKEN below.
#
# Behavior when BRANCH_PROTECTION_TOKEN is absent:
#   - Dependabot context (github.actor == "dependabot[bot]"): skip cleanly,
#     exit 0. Dependabot has its own secret store and won't see this repo's
#     regular secrets; skipping keeps action-upgrade PRs unblocked.
#   - Every other context (push, schedule, workflow_dispatch, human PR):
#     HARD FAIL. This check is required-status-check; silently passing on
#     missing secret would be a bypass vector (anyone with delete-secrets
#     permission could disable the drift control while CI stays green).
#
# Prior to v0.4.3 the workflow exited 0 unconditionally on missing secret —
# fine when this check was opt-in / not required, but a vulnerability once
# it became a required-status-check. Fixed in response to audit feedback.

on:
  schedule:
    # Daily at 06:15 UTC — soon after CodeQL's Monday scan.
    - cron: "15 6 * * *"
  # Run on every PR (no path filter) so this check can serve as a required
  # branch-protection context.
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-drift:
    name: assert protection matches .github/branch-protection.expected.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Fetch live protection and diff against expected
        env:
          # The PAT (or GitHub App token) is required for the API call to
          # /branches/main/protection — GITHUB_TOKEN does not carry the
          # Administration scope. We surface it via env var so bash can
          # check presence safely without expression-injection risk.
          BRANCH_PROTECTION_TOKEN: ${{ secrets.BRANCH_PROTECTION_TOKEN }}
          GH_TOKEN: ${{ secrets.BRANCH_PROTECTION_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${BRANCH_PROTECTION_TOKEN:-}" ]; then
            # Dependabot-triggered workflows can't see regular repo secrets
            # (Dependabot has its own secret store at Settings → Secrets and
            # variables → Dependabot). Skip cleanly so action-upgrade PRs
            # aren't blocked. For every other context — push, schedule,
            # workflow_dispatch, human PR — a missing secret is a HARD FAIL:
            # this check is in the required-status-checks list, and silently
            # passing would be a bypass vector (anyone with admin: delete on
            # secrets could disable the drift control while keeping green CI).
            if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
              echo "⏭  Dependabot context — BRANCH_PROTECTION_TOKEN not available in Dependabot's secret store."
              echo "    Skipping cleanly. Add the secret at Settings → Secrets and variables →"
              echo "    Dependabot if you want this check to run on Dependabot PRs."
              exit 0
            fi
            echo "✗ BRANCH_PROTECTION_TOKEN secret is required but absent."
            echo ""
            echo "  This check is in the required-status-checks list — silently passing"
            echo "  here would defeat its purpose (anyone with permission to delete repo"
            echo "  secrets could disable the drift control while CI stays green)."
            echo ""
            echo "  Either restore the BRANCH_PROTECTION_TOKEN secret (fine-grained PAT"
            echo "  with Administration: Read-only on this repo) or remove this check"
            echo "  from required-status-checks in branch protection if it's intentionally"
            echo "  being retired."
            exit 1
          fi

          # Distill live config to the same invariants the expected file tracks.
          gh api "repos/${GITHUB_REPOSITORY}/branches/main/protection" \
            | jq '{
                required_status_checks: {
                  strict: .required_status_checks.strict,
                  contexts: (.required_status_checks.contexts | sort)
                },
                enforce_admins: .enforce_admins.enabled,
                required_pull_request_reviews: (.required_pull_request_reviews // null),
                required_signatures: .required_signatures.enabled,
                required_linear_history: .required_linear_history.enabled,
                allow_force_pushes: .allow_force_pushes.enabled,
                allow_deletions: .allow_deletions.enabled,
                required_conversation_resolution: .required_conversation_resolution.enabled,
                lock_branch: .lock_branch.enabled,
                allow_fork_syncing: .allow_fork_syncing.enabled,
                block_creations: .block_creations.enabled
              }' \
            > /tmp/protection.live.json

          # Drop the explanatory "_" comment key from expected before diffing.
          jq 'del(._)' .github/branch-protection.expected.json > /tmp/protection.expected.json

          echo "=== expected ==="
          cat /tmp/protection.expected.json
          echo ""
          echo "=== live ==="
          cat /tmp/protection.live.json
          echo ""

          if diff -u /tmp/protection.expected.json /tmp/protection.live.json; then
            echo "✓ branch protection matches expected snapshot"
          else
            echo ""
            echo "✗ DRIFT — live protection differs from .github/branch-protection.expected.json"
            echo ""
            echo "If the drift is intentional, update the snapshot in the same PR"
            echo "that documents the policy change."
            echo ""
            echo "If the drift is unintentional, restore the documented policy via"
            echo "Settings → Branches → Edit rule for 'main' on github.com."
            exit 1
          fi
