permissions:
  alwaysAllow: []
  rationale: "No always-allowed permissions; all tool use is gated by user approval at runtime"

execution_context:
  sandbox: host-agent
  network: localhost-only
  filesystem: read-write
  shell: none
  risk_tier: low

dependencies:
  - name: playwright
    type: npm
    optional: true
    version: ">=1.57.0"
    reason: "Required for systematic multi-breakpoint captures and visual regression; Chrome MCP path has no dependencies. Pinned in the consuming project's lockfile or installed with an explicit version; never installed with @latest or an unversioned npm install."
  - name: pixelmatch
    type: npm
    optional: true
    reason: "Required only for pixel-diff visual regression comparisons"

mitigations:
  - id: COMMAND_EXECUTION
    addressed_in: "3.3.0"
    note: "Removed `sudo npx playwright install-deps` and replaced `node -e \"…\"` checks with an explicit `playwright@1.58.2` install before browser setup. Stdin-friendly templates moved to versioned `assets/scripts/*.js` files."
  - id: PROMPT_INJECTION
    addressed_in: "3.3.0"
    note: "Added `Untrusted Content Boundary` section in SKILL.md. ARIA, DOM, and interactive-map captures are now written wrapped in an `{ boundary: 'untrusted-page-content', source, … }` envelope. The bundled `assets/scripts/screenshot-a11y.js` enforces the envelope."
  - id: SUPPLY_CHAIN
    addressed_in: "3.3.0"
    note: "Documented `npm ci` + lockfile pinning or explicit version installs, never `@latest` or unversioned installs. `ignoreHTTPSErrors` is gated to localhost-only hostnames."

scanning:
  guardskills: SAFE
  guardskills_risk_score: 0
  guardskills_note: "After 3.3.2: no sudo, no `node -e`, no plaintext example credentials. ARIA and DOM captures carry untrusted-content envelopes."
  snyk: pass
  codeql: pass
  expected_findings:
    - id: R005_SECRET_READ
      severity: high
      confidence: medium
      acknowledged: true
      file: references/playwright-patterns.md
      reason: "False positive. The Persistent Browser Sessions example references `process.env.HOME || process.env.USERPROFILE` to compute a `~/.cache/localhost-screenshots/` profile directory — no credentials or secrets are read; the path stores browser cookies/localStorage for multi-step screenshot workflows."
    - id: R005_SECRET_READ
      severity: high
      confidence: medium
      acknowledged: true
      file: references/interaction-templates.md
      reason: "False positive. The Auth → Dashboard template reads `process.env.DEMO_USER` / `DEMO_PASS` as an example of sourcing demo-environment credentials from the environment instead of hardcoding them — this is the secure pattern guardskills R005 is intended to encourage."
    - id: R008_ENV_ACCESS
      severity: low
      file: references/playwright-patterns.md
      reason: "Code examples reference process.env.HOME/USERPROFILE for the optional persistent-session profile directory."
    - id: R008_ENV_ACCESS
      severity: low
      file: references/visual-regression.md
      reason: "Code examples reference environment variables for CI configuration."
    - id: R008_ENV_ACCESS
      severity: low
      file: references/interaction-templates.md
      reason: "Code examples read process.env.DEMO_USER / DEMO_PASS for screenshot login flows — credentials are sourced from the environment instead of being hardcoded."
