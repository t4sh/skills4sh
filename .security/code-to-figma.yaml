  files:
    LICENSE: b208857e4c1af3a61cea456dc048d043e81b07c797c16f2f4b6911f09b4807ff
    SKILL.md: 27be609c174e4775b7c86c9edb7d17550a36d06548db06a185534b9bcded7d20
