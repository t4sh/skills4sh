# Gitleaks config - extend the default ruleset.
# Add repo-specific allowlist entries only after triaging confirmed false positives.

[extend]
useDefault = true

[allowlist]
description = "Allow SHA-256 integrity hashes in AST10 manifests"
condition = "AND"
regexTarget = "line"
paths = ['''^\.security/.*\.yaml$''']
regexes = ['''^\s{4}[A-Za-z0-9_./-]+:\s+[a-f0-9]{64}$''']
